<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Mobile Device Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card mt-5 result-card">
                    <div class="card-header bg-gradient-danger text-white">
                        <h2 class="text-center mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Error</h2>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-danger text-center p-4">
                            <i class="fas fa-times-circle fa-3x mb-3"></i>
                            <h4 class="mb-3">{{ error_message }}</h4>
                        </div>
                        <div class="text-center mt-4">
                            <a href="/" class="btn btn-primary btn-lg px-5 predict-btn">
                                <i class="fas fa-home me-2"></i>Back to Homepage
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
