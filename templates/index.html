<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Device Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-10 offset-md-1">
                <div class="card mt-5 mb-5 main-card">
                    <div class="card-header bg-gradient text-white">
                        <h1 class="text-center mb-0"><i class="fas fa-mobile-alt me-2"></i>Mobile Device Price Predictor</h1>
                    </div>
                    <div class="card-body">
                        <div class="intro-text text-center mb-4">
                            <p>Enter the specifications of a mobile device to predict its used price in rupees.</p>
                        </div>
                        
                        <form action="/predict" method="post">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-section">
                                        <h4 class="form-section-title"><i class="fas fa-info-circle me-2"></i>Basic Information</h4>
                                        
                                        <div class="mb-3">
                                            <label for="device_brand" class="form-label">Device Brand</label>
                                            <select name="device_brand" id="device_brand" class="form-select" required>
                                                <option value="" selected disabled>Select a brand</option>
                                                {% for brand in device_brands %}
                                                <option value="{{ brand }}">{{ brand }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                        
                                        <div class="mb-3">
                                            <label for="os" class="form-label">Operating System</label>
                                            <select name="os" id="os" class="form-select" required>
                                                <option value="" selected disabled>Select an OS</option>
                                                {% for os in operating_systems %}
                                                <option value="{{ os }}">{{ os }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                        
                                        <div class="mb-3">
                                            <label for="screen_size" class="form-label">Screen Size (inches)</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="fas fa-tv"></i></span>
                                                <input type="number" name="screen_size" id="screen_size" class="form-control" min="3" max="8" step="0.1" required>
                                                <span class="input-group-text">inches</span>
                                            </div>
                                        </div>
                                        
                                        <div class="mb-3">
                                            <label class="form-label">4G</label>
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="4g" id="4g_yes" value="yes" required>
                                                <label class="form-check-label" for="4g_yes">Yes</label>
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="4g" id="4g_no" value="no">
                                                <label class="form-check-label" for="4g_no">No</label>
                                            </div>
                                        </div>
                                        
                                        <div class="mb-3">
                                            <label class="form-label">5G</label>
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="5g" id="5g_yes" value="yes" required>
                                                <label class="form-check-label" for="5g_yes">Yes</label>
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="5g" id="5g_no" value="no">
                                                <label class="form-check-label" for="5g_no">No</label>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="form-section">
                                        <h4 class="form-section-title"><i class="fas fa-camera me-2"></i>Camera</h4>
                                        
                                        <div class="mb-3">
                                            <label for="rear_camera_mp" class="form-label">Rear Camera (MP)</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="fas fa-camera"></i></span>
                                                <input type="number" name="rear_camera_mp" id="rear_camera_mp" class="form-control" min="2" max="108" step="0.1" required>
                                                <span class="input-group-text">MP</span>
                                            </div>
                                        </div>
                                        
                                        <div class="mb-3">
                                            <label for="front_camera_mp" class="form-label">Front Camera (MP)</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="fas fa-camera-retro"></i></span>
                                                <input type="number" name="front_camera_mp" id="front_camera_mp" class="form-control" min="1" max="64" step="0.1" required>
                                                <span class="input-group-text">MP</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="col-md-6">
                                    <div class="form-section">
                                        <h4 class="form-section-title"><i class="fas fa-microchip me-2"></i>Performance & Hardware</h4>
                                        
                                        <div class="mb-3">
                                            <label for="internal_memory" class="form-label">Internal Memory (GB)</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="fas fa-hdd"></i></span>
                                                <input type="number" name="internal_memory" id="internal_memory" class="form-control" min="8" max="1024" required>
                                                <span class="input-group-text">GB</span>
                                            </div>
                                        </div>
                                        
                                        <div class="mb-3">
                                            <label for="ram" class="form-label">RAM (GB)</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="fas fa-memory"></i></span>
                                                <input type="number" name="ram" id="ram" class="form-control" min="1" max="32" step="0.5" required>
                                                <span class="input-group-text">GB</span>
                                            </div>
                                        </div>
                                        
                                        <div class="mb-3">
                                            <label for="battery" class="form-label">Battery (mAh)</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="fas fa-battery-full"></i></span>
                                                <input type="number" name="battery" id="battery" class="form-control" min="1500" max="10000" required>
                                                <span class="input-group-text">mAh</span>
                                            </div>
                                        </div>
                                        
                                        <div class="mb-3">
                                            <label for="weight" class="form-label">Weight (g)</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="fas fa-weight"></i></span>
                                                <input type="number" name="weight" id="weight" class="form-control" min="100" max="400" required>
                                                <span class="input-group-text">g</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="form-section">
                                        <h4 class="form-section-title"><i class="fas fa-clock me-2"></i>Time & Price</h4>
                                        
                                        <div class="mb-3">
                                            <label for="release_year" class="form-label">Release Year</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="fas fa-calendar-alt"></i></span>
                                                <input type="number" name="release_year" id="release_year" class="form-control" min="2010" max="2024" required>
                                            </div>
                                        </div>
                                        
                                        <div class="mb-3">
                                            <label for="days_used" class="form-label">Days Used</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="fas fa-hourglass-half"></i></span>
                                                <input type="number" name="days_used" id="days_used" class="form-control" min="0" max="2000" required>
                                                <span class="input-group-text">days</span>
                                            </div>
                                        </div>
                                        
                                        <div class="mb-3">
                                            <label for="normalized_new_price" class="form-label">Normalized New Price</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="fas fa-tag"></i></span>
                                                <input type="number" name="normalized_new_price" id="normalized_new_price" class="form-control" min="0.1" max="10" step="0.01" required>
                                            </div>
                                            <small class="form-text text-muted">Scale of 0.1 to 10, higher value indicates higher original price</small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg predict-btn">
                                    <i class="fas fa-calculator me-2"></i>Predict Price
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
