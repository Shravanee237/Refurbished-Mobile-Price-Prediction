<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Refurbished Mobile Price Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- HEADING -->
    <h1 style="text-align:center; color:#1e3a8a; margin-top:20px;">
        Refurbished Mobile Price Prediction
    </h1>

    <p style="text-align:center;">
        Enter the specifications of a mobile device to predict its used price in rupees.
    </p>

    <form action="/predict" method="post">

        <div class="container">

            <!-- BASIC INFO -->
            <div class="card">
                <h2>Basic Information</h2>

                <div class="form-group">
                    <label for="brand">Device Brand</label>
                    <select id="brand" name="brand" onchange="handleBrandChange(this)" required>
                        <option value="" disabled selected>Select a brand</option>
                        <option>Samsung</option>
                        <option>Apple</option>
                        <option>Xiaomi</option>
                        <option>Realme</option>
                        <option>OnePlus</option>
                        <option>Oppo</option>
                        <option>Vivo</option>
                        <option>Motorola</option>
                        <option>Google</option>
                        <option>Nokia</option>
                        <option>Poco</option>
                        <option>iQOO</option>
                        <option value="Other">Other</option>
                    </select>

                    <input type="text" id="otherBrand" name="other_brand"
                           placeholder="Enter your brand"
                           style="display:none; margin-top:8px;">
                </div>

                <div class="form-group">
                    <label for="os">Operating System</label>
                    <select id="os" name="os" required>
                        <option value="" disabled selected>Select an OS</option>
                        <option>Android</option>
                        <option>iOS</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="screen_size">Screen Size (inches)</label>
                    <input id="screen_size" type="number" step="0.1" name="screen_size" min="4" max="8" required>
                </div>

                <div class="form-group">
                    <label for="has_4g">4G</label>
                    <select id="has_4g" name="has_4g" required>
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="has_5g">5G</label>
                    <select id="has_5g" name="has_5g" required>
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

            </div>

            <!-- HARDWARE -->
            <div class="card">
                <h2>Performance & Hardware</h2>

                <div class="form-group">
                    <label for="internal_memory">Internal Memory (GB)</label>
                    <input id="internal_memory" type="number" name="internal_memory" min="4" max="1024" required>
                </div>

                <div class="form-group">
                    <label for="ram">RAM (GB)</label>
                    <input id="ram" type="number" name="ram" min="1" max="32" required>
                </div>

                <div class="form-group">
                    <label for="battery">Battery (mAh)</label>
                    <input id="battery" type="number" name="battery" min="1000" max="10000" required>
                </div>

                <div class="form-group">
                    <label for="weight">Weight (g)</label>
                    <input id="weight" type="number" name="weight" min="100" max="300" required>
                </div>

            </div>

            <!-- CAMERA & TIME -->
            <div class="card">
                <h2>Camera & Time</h2>

                <div class="form-group">
                    <label for="rear_camera">Rear Camera (MP)</label>
                    <input id="rear_camera" type="number" name="rear_camera_mp" min="5" max="200" required>
                </div>

                <div class="form-group">
                    <label for="front_camera">Front Camera (MP)</label>
                    <input id="front_camera" type="number" name="front_camera_mp" min="2" max="100" required>
                </div>

                <div class="form-group">
                    <label for="release_year">Release Year</label>
                    <input id="release_year" type="number" name="release_year" min="2010" max="2026" required>
                </div>

                <div class="form-group">
                    <label for="days_used">Days Used</label>
                    <input id="days_used" type="number" name="days_used" min="1" max="2000" required>
                </div>

                <div class="form-group">
                    <label for="original_price">Original Price (₹)</label>
                    <input id="original_price" 
                           type="number" 
                           name="original_price" 
                           min="1000" max="200000"
                           placeholder="e.g. 20000"
                           required>
                </div>

            </div>

        </div>

        <div style="text-align:center; margin-top:20px;">
            <button type="submit">Predict Price</button>
        </div>

    </form>

</body>
</html>

<script>
function handleBrandChange(select) {
    const otherInput = document.getElementById("otherBrand");

    if (select.value === "Other") {
        otherInput.style.display = "block";
    } else {
        otherInput.style.display = "none";
        otherInput.value = "";
    }
}
</script>
